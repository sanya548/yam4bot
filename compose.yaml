services:
  yam4bot:
    build:
      context: .
    restart: unless-stopped
    env_file: ".env"
    volumes:
      - bot_db:/app/data/
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f \"python3 bot.py\" > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  bot_db:
